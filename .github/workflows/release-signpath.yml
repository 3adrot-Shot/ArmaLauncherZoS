name: release-signpath

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sign-client:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'ArmaLauncherClient/ArmaLauncherClient.csproj'
          $propertyGroups = @($project.Project.PropertyGroup)
          $version = $propertyGroups | ForEach-Object { $_.Version } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1
          $fileVersion = $propertyGroups | ForEach-Object { $_.FileVersion } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1
          $assemblyVersion = $propertyGroups | ForEach-Object { $_.AssemblyVersion } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "file_version=$fileVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "assembly_version=$assemblyVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate tag matches project version
        if: ${{ github.event_name == 'push' }}
        shell: pwsh
        run: |
          $projectVersion = '${{ steps.version.outputs.version }}'
          $tagVersion = '${{ github.ref_name }}'

          if ($tagVersion.StartsWith('v')) {
            $tagVersion = $tagVersion.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw 'Version is not set in ArmaLauncherClient.csproj.'
          }

          if ($tagVersion -ne $projectVersion) {
            throw "Tag version '$tagVersion' does not match project Version '$projectVersion' in ArmaLauncherClient.csproj."
          }

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ArmaLauncher.slnx

      - name: Publish client
        run: dotnet publish ArmaLauncherClient/ArmaLauncherClient.csproj --configuration Publish --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/client

      - name: Collect client executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/unsigned -Force | Out-Null
          Copy-Item artifacts/client/ArmaLauncherClient.exe artifacts/unsigned/ArmaLauncherClient-win-x64-v${{ steps.version.outputs.version }}.exe -Force

      - name: Archive unsigned client artifact
        shell: pwsh
        run: |
          Push-Location artifacts/unsigned
          Compress-Archive -Path ArmaLauncherClient-win-x64-v${{ steps.version.outputs.version }}.exe -DestinationPath ..\ArmaLauncherClient-unsigned.zip -Force
          Pop-Location

      - name: Upload unsigned artifact for SignPath
        id: upload_unsigned
        uses: actions/upload-artifact@v5
        with:
          name: ArmaLauncherClient-unsigned-zip
          path: artifacts/ArmaLauncherClient-unsigned.zip
          if-no-files-found: error

      - name: Check SignPath configuration
        id: signpath_config
        shell: pwsh
        run: |
          $required = @(
            $env:SIGNPATH_API_TOKEN,
            $env:SIGNPATH_ORGANIZATION_ID,
            $env:SIGNPATH_PROJECT_SLUG,
            $env:SIGNPATH_SIGNING_POLICY_SLUG
          )

          if ($required | Where-Object { [string]::IsNullOrWhiteSpace($_) }) {
            "configured=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            "configured=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Submit signing request
        id: signpath
        if: ${{ steps.signpath_config.outputs.configured == 'true' }}
        uses: signpath/github-action-submit-signing-request@v2.2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/signed
          skip-decompress: false

      - name: Fail when SignPath is not configured
        if: ${{ steps.signpath_config.outputs.configured != 'true' }}
        shell: pwsh
        run: |
          Write-Error 'SignPath secrets are not configured. Add SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID, SIGNPATH_PROJECT_SLUG and SIGNPATH_SIGNING_POLICY_SLUG.'

      - name: Upload signed client artifact
        if: ${{ steps.signpath.outputs.signing-request-id != '' }}
        uses: actions/upload-artifact@v5
        with:
          name: ArmaLauncherClient-signed
          path: artifacts/signed/ArmaLauncherClient-win-x64-v${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

      - name: Attach signed artifact to release
        if: ${{ github.event_name == 'push' && steps.signpath.outputs.signing-request-id != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/signed/ArmaLauncherClient-win-x64-v${{ steps.version.outputs.version }}.exe
