name = "ai-model-launcher"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# R2 Bucket binding
[[r2_buckets]]
binding = "MODELS_BUCKET"
bucket_name = "ai-models"

# KV Namespace for manifest caching
[[kv_namespaces]]
binding = "MANIFESTS_KV"
id = "your-kv-namespace-id"

# Routes
# Uncomment and configure for your domain
# routes = [
#   { pattern = "models.your-domain.com/*", zone_name = "your-domain.com" }
# ]

# Environment variables
[vars]
ENVIRONMENT = "production"

# Development settings
[dev]
port = 8787
local_protocol = "http"
